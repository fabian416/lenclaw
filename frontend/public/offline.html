<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#8b5cf6" />
  <title>Lenclaw - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: #0a0e1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .offline-container {
      max-width: 420px;
      width: 100%;
    }
    .icon-wrapper {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon-wrapper svg {
      width: 40px;
      height: 40px;
      color: #8b5cf6;
    }
    .brand {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 1.5rem;
      font-weight: 700;
      color: #8b5cf6;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #e2e8f0;
    }
    p {
      font-size: 0.875rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 2rem;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 0.875rem;
      font-weight: 600;
      color: #fff;
      background: #8b5cf6;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.03em;
    }
    .retry-btn:hover {
      background: #7c3aed;
    }
    .retry-btn:active {
      background: #6d28d9;
    }
    .grid-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image:
        repeating-linear-gradient(0deg, rgba(139, 92, 246, 0.04) 0 1px, transparent 1px 24px),
        repeating-linear-gradient(90deg, rgba(139, 92, 246, 0.04) 0 1px, transparent 1px 24px);
      background-size: 24px 24px;
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f59e0b;
      margin-right: 0.5rem;
      animation: pulse 2s ease-in-out infinite;
    }
    .status-text {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 2rem;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="offline-container">
    <div class="icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="2" x2="22" y1="2" y2="22"></line>
        <path d="M8.5 16.5a5 5 0 0 1 7 0"></path>
        <path d="M2 8.82a15 15 0 0 1 4.17-2.65"></path>
        <path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"></path>
        <path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"></path>
        <path d="M5 12.859a10 10 0 0 1 5.17-2.69"></path>
        <line x1="12" x2="12.01" y1="20" y2="20"></line>
      </svg>
    </div>
    <div class="brand">LENCLAW</div>
    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection.
      Some features may be unavailable until you reconnect.
    </p>
    <button class="retry-btn" onclick="window.location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
        <path d="M3 3v5h5"></path>
        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"></path>
        <path d="M16 16h5v5"></path>
      </svg>
      Retry Connection
    </button>
    <div class="status-text">
      <span class="status-dot"></span>
      Waiting for network...
    </div>
  </div>
</body>
</html>
