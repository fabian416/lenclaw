  <path d="M44 79 Q50 45 48 16" stroke="white" stroke-width="8.5" stroke-linecap="round" fill="none"/>
  <path d="M59 78 Q58 42 61 16" stroke="white" stroke-width="8.5" stroke-linecap="round" fill="none"/>
