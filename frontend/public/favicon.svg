<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Door body - rectangular, sharp corners -->
  <rect x="6" y="2" width="19" height="27" rx="1" fill="#ea580c"/>
  <!-- Doorknob -->
  <circle cx="22" cy="16" r="1.6" fill="white" opacity="0.9"/>
  <!-- Three claw marks - shifted left -->
  <path d="M9 25 Q12 15 11 5" stroke="white" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <path d="M14 25.5 Q16 14.5 15.5 5" stroke="white" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <path d="M19 25 Q18.5 13.5 19.5 5" stroke="white" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <!-- Floor line extending right - Lendoor inspired -->
  <line x1="24" y1="27.5" x2="31.5" y2="27.5" stroke="#ea580c" stroke-width="2.5" stroke-linecap="round"/>
</svg>
