# =============================================================================
# Lenclaw - Build & Deploy Pipeline
# On push to main/develop: build Docker images, push to ghcr.io, deploy
# =============================================================================

name: Build & Deploy

env:
  IMAGE_TAG_BACKEND: ghcr.io/${{ github.repository_owner }}/lenclaw/backend
  IMAGE_TAG_FRONTEND: ghcr.io/${{ github.repository_owner }}/lenclaw/frontend
  IMAGE_VERSION: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

on:
  push:
    branches:
      - main
      - develop

jobs:
  # ---------------------------------------------------------------------------
  # Build and push Frontend image
  # ---------------------------------------------------------------------------
  build_frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx Install
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_TAG_FRONTEND }}:${{ env.IMAGE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Build and push Backend image
  # ---------------------------------------------------------------------------
  build_backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx Install
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_TAG_BACKEND }}:${{ env.IMAGE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Deploy (only on main)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build_frontend, build_backend]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          echo "=========================================="
          echo " DEPLOY"
          echo "=========================================="
          echo ""
          echo "Frontend image: ${{ env.IMAGE_TAG_FRONTEND }}:production"
          echo "Backend image:  ${{ env.IMAGE_TAG_BACKEND }}:production"
          echo ""
          echo "Replace this step with your deployment strategy:"
          echo "  - docker compose pull && docker compose up -d"
          echo "  - kubectl apply -f k8s/"
          echo "  - SSH + docker compose on VPS"
          echo ""
          echo "=========================================="
