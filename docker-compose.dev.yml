# =============================================================================
# Lenclaw - Local Development
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# =============================================================================

name: lenclaw-local

services:
  # ---------------------------------------------------------------------------
  # Frontend - Vite dev server with hot reload
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    image: lenclaw-frontend:dev
    command: ["npm", "run", "dev"]
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits: {}

  # ---------------------------------------------------------------------------
  # Backend - uvicorn with --reload
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: deps
    image: lenclaw-backend:dev
    command: >
      sh -c "alembic -c alembic.ini upgrade head &&
             python -m uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend/src:/app/src
      - ./backend/config:/app/config
      - ./backend/tests:/app/tests
      - ./backend/alembic.ini:/app/alembic.ini
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - DEBUG=true
    deploy:
      resources:
        limits: {}

  # ---------------------------------------------------------------------------
  # PostgreSQL - expose port for local tooling
  # ---------------------------------------------------------------------------
  postgres:
    ports:
      - "5433:5432"
    deploy:
      resources:
        limits: {}

  # ---------------------------------------------------------------------------
  # Redis - expose port for local tooling
  # ---------------------------------------------------------------------------
  redis:
    ports:
      - "6380:6379"
    deploy:
      resources:
        limits: {}

  # ---------------------------------------------------------------------------
  # Caddy - disabled in dev (access services directly)
  # ---------------------------------------------------------------------------
  caddy:
    profiles:
      - proxy
    deploy:
      resources:
        limits: {}
