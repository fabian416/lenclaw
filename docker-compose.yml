# =============================================================================
# Lenclaw - Production Docker Compose
# Usage: docker compose up -d
# =============================================================================

name: lenclaw-prod

services:
  # ---------------------------------------------------------------------------
  # Caddy - Reverse Proxy (auto HTTPS + routing)
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: lenclaw_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - lenclaw_network
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Frontend - React SPA served by nginx
  # ---------------------------------------------------------------------------
  frontend:
    image: ghcr.io/lucholeonel/lenclaw/frontend:production
    container_name: lenclaw_frontend
    restart: always
    networks:
      - lenclaw_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Backend - FastAPI + Gunicorn/Uvicorn
  # ---------------------------------------------------------------------------
  backend:
    image: ghcr.io/lucholeonel/lenclaw/backend:production
    container_name: lenclaw_backend
    restart: always
    command: >
      sh -c "alembic -c alembic.ini upgrade head &&
             gunicorn src.main:app
             --bind 0.0.0.0:8000
             --worker-class uvicorn.workers.UvicornWorker
             --workers 4
             --timeout 120
             --graceful-timeout 30
             --access-logfile -
             --error-logfile -"
    env_file:
      - .env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-lenclaw_db}
      REDIS_URL: redis://redis:6379/0
    networks:
      - lenclaw_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # PostgreSQL 15
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: lenclaw_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-lenclaw_db}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - lenclaw_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-lenclaw_db}"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: lenclaw_redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - lenclaw_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M

# =============================================================================
# Volumes
# =============================================================================
volumes:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config:

# =============================================================================
# Network
# =============================================================================
networks:
  lenclaw_network:
    driver: bridge
